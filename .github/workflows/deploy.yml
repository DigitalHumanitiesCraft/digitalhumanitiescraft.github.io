name: Deploy dhcraft.org

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Wöchentlicher Rebuild: die YouTube-Videoliste wird zur Buildzeit gefetcht und
  # friert sonst auf dem Stand des letzten Pushes ein. Der committete
  # src/lib/videos-cache.json dient als Fallback, ein Feed-Ausfall bricht den
  # Build nie. Krumme Minute, weil GitHub volle Stunden drosselt.
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
